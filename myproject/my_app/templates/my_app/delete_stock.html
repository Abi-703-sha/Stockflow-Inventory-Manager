{% extends 'my_app/base.html' %}

{% block title %}Delete Stock - StockFlow{% endblock %}

{% block content %}
<div class="auth-container">
<div class="auth-header">
<h1 style="color: var(--accent);">Delete Item?</h1>
<p>Are you sure you want to permanently delete <strong>{{ stock.name }}</strong> from your inventory?</p>
</div>

<form method="post">
{% csrf_token %}
<div style="display: flex; gap: 1rem; margin-top: 2rem;">
    <button type="submit" class="btn" style="background: var(--accent); flex: 1;">Delete Permanently</button>
    <a href="{% url 'dashboard' %}" class="btn" style="background: rgba(255,255,255,0.1); text-decoration: none; text-align: center; flex: 1; padding: 1rem;">Cancel</a>
</div>
</form>

<div style="margin-top: 2rem; padding: 1rem; background: rgba(239, 68, 68, 0.1); border-radius: 0.75rem; border: 1px solid rgba(239, 68, 68, 0.2); text-align: center; font-size: 0.85rem; color: var(--text-secondary);">
This action cannot be undone.
</div>
</div>
{% endblock %}
