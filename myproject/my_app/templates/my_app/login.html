{% extends 'my_app/base.html' %}

{% block title %}Login - StockFlow{% endblock %}

{% block content %}
<div class="auth-wrapper" style="margin-top: 0; min-height: 100vh;">
    <div class="auth-container">
        <div class="auth-header">
            <h1>Sign In</h1>
            <p>Login to your StockFlow account.</p>
        </div>
        
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Username</label>
                <input type="text" name="username" id="id_username" placeholder="Enter your username" required>
            </div>
            <div class="form-group" style="margin-bottom: 0.5rem;">
                <label for="id_password">Password</label>
                <input type="password" name="password" id="id_password" placeholder="Enter your password" required>
            </div>
            
            <div style="text-align: right; margin-bottom: 2rem;">
                <a href="{% url 'password_reset' %}" style="font-size: 0.875rem; color: var(--primary); text-decoration: none; font-weight: 500;">Forgot password?</a>
            </div>
            
            <button type="submit" class="btn">Login</button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="{% url 'signup' %}">Create one</a>
        </div>
    </div>
</div>
{% endblock %}
